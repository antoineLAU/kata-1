<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header>
        <h1>Mes citation</h1>
        <h2>Gestionnaire</h2>
    </header>
    <main>
        <h3 id="nombreCitation">citation</h3>
        <hr>
        <!-- Etape 2 -->
        <form>
            <input type="text" id="titre" placeholder="texte" >
            <input type="text" id="author" placeholder="auteurs" > 
            <button id="bouton">Envoyé</button>
        </form>
        <!-- Etape 3 -->
        <div id="quote-list">
            <div class="quote">
                <p class="text">Citation: "On ne naît pas femme, on le devient</p>
                <p class="author">Autrice: Simone de Beauvoir</p>
            </div>
        </div>
    </main>
<script src="./assets/js/script.js"></script>
</body>
</html>
