<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header>
        <h1>Mes citation</h1>
        <h2>Gestionnaire</h2>
    </header>
    <main>
        <h3 id="nombreCitation">citation</h3>
        <hr>
        <!-- Etape 2 -->
        <form>
            <label for="citation">Citation</label>
            <input type="text" id="titre" >
            <label for="auteurs">Auteurs</label>
            <input type="text" id="author"> 
            <button id="bouton">Envoyé</button>
        </form>
        <hr>
        
        <!-- Etape 3 -->
        <div id="quote-list">
            <div class="quote">
                <p class="text">Citation: "On ne naît pas femme, on le devient".</p>
                <p class="author">"Auteurs: Simone de Beauvoir".</p>
                <hr>
            </div>
        </div>
    </main>
<script src="./assets/js/script.js"></script>
</body>
</html>
